  let currentDiff = 'easy';
  let currentPaper = null;
  let userAnswers = [];

  function selectDiff(diff, btn) {
    currentDiff = diff;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    resetToDraw();
  }

  function resetToDraw() {
    document.getElementById('quizArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('drawArea').style.display = 'block';
    document.getElementById('drawStatus').textContent = '点击按钮抽一组题';
    const drawBtn = document.getElementById('drawBtn');
    drawBtn.disabled = false;
    drawBtn.textContent = '✨ 抽取题组 ✨';
    drawBtn.onclick = startDraw;
    currentPaper = null;
    userAnswers = [];
  }

  function startDraw() {
    const pool = paperPool.filter(p => p.difficulty === currentDiff);
    if (pool.length === 0) {
      alert('当前难度下没有题组，请重试。');
      return;
    }
    const drawBtn = document.getElementById('drawBtn');
    drawBtn.disabled = true;
    drawBtn.textContent = '🎰 抽题中...';
    const statusEl = document.getElementById('drawStatus');
    statusEl.textContent = '正在随机挑选...';

    const interval = setInterval(() => {
      const rand = pool[Math.floor(Math.random() * pool.length)];
      statusEl.textContent = '📋 ' + rand.name;
    }, 100);

    setTimeout(() => {
      clearInterval(interval);
      const paper = pool[Math.floor(Math.random() * pool.length)];
      currentPaper = paper;
      userAnswers = new Array(paper.questions.length).fill(-1);
      statusEl.textContent = '✅ 抽中：' + paper.name;
      drawBtn.textContent = '✨ 开始答题';
      drawBtn.disabled = false;
      drawBtn.onclick = showQuiz;
    }, 800);
  }

  function showQuiz() {
    if (!currentPaper) return;
    document.getElementById('drawArea').style.display = 'none';
    document.getElementById('quizArea').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('paperTitle').textContent = '📝 ' + currentPaper.name;
    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';

    currentPaper.questions.forEach((q, idx) => {
      const qBlock = document.createElement('div');
      qBlock.className = 'question-block';
      const isJudge = q.options.length === 2 && q.options[0] === '正确' && q.options[1] === '错误';
      let optionsHtml = '';
      q.options.forEach((opt, optIdx) => {
        const prefix = isJudge ? '' : (String.fromCharCode(65 + optIdx) + '. ');
        optionsHtml += `
          <label>
            <input type="radio" name="q${idx}" value="${optIdx}" onclick="selectAnswer(${idx}, ${optIdx})">
            ${prefix}${opt}
          </label>
        `;
      });
      qBlock.innerHTML = `
        <div class="question-text">${idx+1}. ${q.question}</div>
        <div class="options">${optionsHtml}</div>
      `;
      container.appendChild(qBlock);
    });
  }

  function selectAnswer(qIdx, optIdx) {
    userAnswers[qIdx] = optIdx;
  }

  function submitQuiz() {
    if (!currentPaper) return;
    const unanswered = userAnswers.findIndex(a => a === -1);
    if (unanswered !== -1) {
      alert(`请先完成第 ${unanswered+1} 题`);
      return;
    }
    let score = 0;
    currentPaper.questions.forEach((q, idx) => {
      if (userAnswers[idx] === q.answer) score++;
    });
    const total = currentPaper.questions.length;
    document.getElementById('quizArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('scoreDisplay').textContent = `${score} / ${total}`;
    const percent = score / total;
    let msg = '';
    if (percent === 1) msg = '🎉 全部正确，太厉害了！';
    else if (percent >= 0.6) msg = '👍 不错，继续加油！';
    else msg = '📖 再试一次吧~';
    document.getElementById('scoreMsg').textContent = msg;
  }
